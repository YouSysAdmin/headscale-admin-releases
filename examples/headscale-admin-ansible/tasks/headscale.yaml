---
# Pre-seed the managed headscale's config (config only - the binary is still
# downloaded and supervised by headscale-admin). headscale-admin reads
# listen_addr / grpc_listen_addr / unix_socket from this file, so keep the
# loopback listeners intact.

- name: Ensure DERP maps directory exists
  ansible.builtin.file:
    path: "{{ headscale_derp_paths_dir }}"
    state: directory
    owner: "{{ headscale_admin_user }}"
    group: "{{ headscale_admin_group }}"
    mode: "0750"
  when: headscale_derp_maps | length > 0

- name: Render DERP map files
  ansible.builtin.template:
    src: derp-map.yaml.j2
    dest: "{{ headscale_derp_paths_dir }}/{{ item.filename }}"
    owner: "{{ headscale_admin_user }}"
    group: "{{ headscale_admin_group }}"
    mode: "0640"
  loop: "{{ headscale_derp_maps }}"
  loop_control:
    label: "{{ item.filename }}"
  register: _derp_rendered
  when: headscale_derp_maps | length > 0

- name: Collect rendered DERP map paths
  ansible.builtin.set_fact:
    headscale_derp_local_paths: >-
      {{
        _derp_rendered.results
        | map(attribute='item.filename')
        | map('regex_replace', '^', (headscale_derp_paths_dir | regex_replace('/+$', '')) ~ '/')
        | list
      }}
  when: headscale_derp_maps | length > 0

- name: Write headscale Noise private key
  ansible.builtin.copy:
    content: "{{ headscale_noise_private_key }}"
    dest: "{{ headscale_noise_private_key_path }}"
    owner: "{{ headscale_admin_user }}"
    group: "{{ headscale_admin_group }}"
    mode: "0600"
  no_log: true
  when: headscale_noise_private_key | length > 0
  notify: Restart headscale-admin

- name: Write headscale DERP private key
  ansible.builtin.copy:
    content: "{{ headscale_derp_private_key }}"
    dest: "{{ headscale_derp_private_key_path }}"
    owner: "{{ headscale_admin_user }}"
    group: "{{ headscale_admin_group }}"
    mode: "0600"
  no_log: true
  when: headscale_derp_private_key | length > 0
  notify: Restart headscale-admin

- name: Write headscale OIDC client secret file
  ansible.builtin.copy:
    content: "{{ headscale_oidc_client_secret }}"
    dest: "{{ headscale_oidc_client_secret_path }}"
    owner: "{{ headscale_admin_user }}"
    group: "{{ headscale_admin_group }}"
    mode: "0600"
  no_log: true
  when:
    - headscale_oidc_enabled | bool
    - headscale_oidc_client_secret | length > 0
    - headscale_oidc_client_secret_path | length > 0
  notify: Restart headscale-admin

- name: Render managed headscale.yaml
  ansible.builtin.template:
    src: headscale-config.yaml.j2
    dest: "{{ headscale_admin_work_dir }}/headscale.yaml"
    owner: "{{ headscale_admin_user }}"
    group: "{{ headscale_admin_group }}"
    mode: "0640"
    # When force is false, an existing headscale.yaml (UI/manual edits, or one
    # already generated by headscale-admin) is left untouched.
    force: "{{ headscale_preconfigure_force | bool }}"
  notify: Restart headscale-admin
