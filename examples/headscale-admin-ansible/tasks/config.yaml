---
- name: Render headscale-admin config.yaml
  ansible.builtin.template:
    src: config.yaml.j2
    dest: "{{ headscale_admin_config_file }}"
    owner: root
    group: "{{ headscale_admin_group }}"
    mode: "0640"
  notify: Restart headscale-admin

- name: Render headscale-admin env file (HSA_* secrets)
  ansible.builtin.template:
    src: env.j2
    dest: "{{ headscale_admin_env_file }}"
    owner: root
    group: "{{ headscale_admin_group }}"
    mode: "0640"
  notify: Restart headscale-admin
